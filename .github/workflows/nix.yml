name: nix

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

jobs:
  build:
    name: nix build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: cachix/cachix-action@v17
        with:
          name: tsirysndr
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the root default package (built from the ./cli source).
      # Retry once to ride out transient github.com 5xx while fetching inputs.
      - name: nix build
        run: nix build -L || (sleep 15 && nix build -L)

      - name: nix flake check
        run: nix flake check -L
