name: nix

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

jobs:
  build:
    name: nix build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: tsirysndr
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the root default package (delegates to the ./cli sub-flake).
      - name: nix build
        run: nix build -L

      - name: nix flake check
        run: nix flake check -L
