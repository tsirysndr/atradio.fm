name: nix

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "cli/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

jobs:
  build:
    name: nix build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
      
      - uses: cachix/cachix-action@v17
        with:
          name: tsirysndr
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the root default package (built from the ./cli source).
      # Retry once to ride out transient github.com 5xx while fetching inputs.
      - name: nix build
        run: |
          for i in {1..5}; do
            if GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} nix build -L --accept-flake-config; then
              echo "Build succeeded!"
              exit 0
            fi
            echo "Attempt $i failed (likely GitHub 503/rate limit), retrying in $((i*10))s..."
            sleep $((i*10))
          done
          echo "Build failed after retries"
          exit 1

