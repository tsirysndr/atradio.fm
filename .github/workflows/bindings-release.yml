# Builds the native binding libraries for every supported platform and uploads
# them to a per-version GitHub release:
#   - libatradio_uniffi-<triple>.{so,dylib}  → Python (UniFFI), Ruby, Clojure
#   - atradio_nif-<triple>.so                → Erlang (Rustler NIF)
#
# Each artifact is built on a NATIVE runner (the triple only names the output; we
# don't cross-compile). The Erlang loader (sdk/erlang/src/atradio_nif.erl)
# downloads the matching atradio_nif-<triple>.so from this release on first load,
# verifying it against priv/atradio_nif.manifest — which the local publish step
# (sdk/scripts/publish-erlang.sh) fills from these same artifacts before
# `rebar3 hex publish`.
#
# The .so is too large to bundle in a Hex tarball; other SDKs may bundle the
# uniffi lib into wheels/gems/jars or download it similarly.
#
# Platforms: linux, macOS, FreeBSD, NetBSD, OpenBSD (x86_64 + arm64 where hosted).
name: bindings-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (default erlang-v<vsn> from sdk/erlang/src/atradio.app.src)"
        type: string
        required: false
  push:
    tags:
      - "erlang-v*"
      - "bindings-v*"

permissions:
  contents: write

env:
  WORKDIR: sdk/scripts

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VER="$(sed -n 's/.*{vsn, *"\([^"]*\)".*/\1/p' sdk/erlang/src/atradio.app.src | head -1)"
            [ -n "$VER" ] || { echo "could not read {vsn,...} from atradio.app.src" >&2; exit 1; }
            TAG="bindings-v$VER"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"
      - name: Ensure release exists (auto-creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "atradio binding libraries ($TAG)" \
              --notes "Native binding libraries (libatradio_uniffi + atradio_nif) for the atradio SDKs. Managed by bindings-release.yml." \
              --target "$GITHUB_SHA" --prerelease
          fi

  build:
    needs: prepare-release
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-linux-gnu
            os: ubuntu-latest
          - target: aarch64-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build native libs (${{ matrix.target }})
        run: bash "$WORKDIR/build-native.sh" "${{ matrix.target }}"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare-release.outputs.tag }}" "$WORKDIR"/dist/* --clobber

  # BSDs — best-effort, built inside a cross-platform-actions VM. No system deps:
  # the SDK crates use rustls (no OpenSSL, no audio libs).
  build-bsd:
    needs: prepare-release
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-freebsd
            os: freebsd
            version: "14.2"
            pkg: sudo pkg install -y rust
          - target: x86_64-unknown-netbsd
            os: netbsd
            version: "10.1"
            pkg: sudo pkgin -y install rust
          #- target: x86_64-unknown-openbsd
          #  os: openbsd
          #  version: "7.9"
          #  pkg: sudo pkg_add rust
    steps:
      - uses: actions/checkout@v4
      - name: Build native libs in ${{ matrix.os }} VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          architecture: x86_64
          shell: sh
          run: |
            set -eux
            ${{ matrix.pkg }}
            export CARGO_PROFILE_RELEASE_DEBUG=0 CARGO_PROFILE_RELEASE_STRIP=symbols
            bash sdk/scripts/build-native.sh ${{ matrix.target }}
            ls -l sdk/scripts/dist
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare-release.outputs.tag }}" "$WORKDIR"/dist/* --clobber
