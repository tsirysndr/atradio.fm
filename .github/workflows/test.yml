name: test

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    name: typecheck + test (web + api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Typecheck + run the vitest suites for the web app and the API.
      - name: Typecheck
        run: bunx turbo run typecheck --filter='./apps/*'

      - name: Test
        run: bunx turbo run test --filter='./apps/*'
